<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Echo Moon Art</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Jost:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="grain-overlay" aria-hidden="true"></div>
    <div id="ember-field" class="ember-field" aria-hidden="true"></div>

    <header class="site-header">
        <a href="../index.html" class="wordmark">Echo Moon Art</a>

        <nav class="main-nav" aria-label="Primary">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="commission.html" class="nav-link">Commission</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>

        <button class="logout-glyph" id="logoutBtn" aria-label="Log out" title="Log out">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M9 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3" />
                <path d="M16 16l4-4-4-4" />
                <path d="M20 12H9" />
            </svg>
        </button>

        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main>

        <!-- DASHBOARD HERO -->
        <section class="page-hero">
            <p class="eyebrow eyebrow-center"><span class="moon-glyph">☾</span> private dashboard</p>
            <h1 class="page-title">Your Messages</h1>
            <p class="page-sub" id="dashboardSub">Loading…</p>
        </section>

        <svg class="vine-divider" viewBox="0 0 800 60" preserveAspectRatio="none" aria-hidden="true">
            <path class="vine-path" d="M0,30 C150,0 250,60 400,30 C550,0 650,60 800,30" fill="none" stroke="url(#vineGrad)" stroke-width="1.5" />
            <defs>
                <linearGradient id="vineGrad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#9b59b6" stop-opacity="0" />
                    <stop offset="50%" stop-color="#9b59b6" stop-opacity="0.8" />
                    <stop offset="100%" stop-color="#9b59b6" stop-opacity="0" />
                </linearGradient>
            </defs>
        </svg>

        <!-- MESSAGE LIST -->
        <section class="section dashboard-section">

            <div class="dashboard-filter-bar">
                <button class="filter-btn is-active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="unread">Unread</button>
            </div>

            <div class="message-list" id="messageList">
                <!-- messages render here via dashboard.js -->
            </div>

            <p class="empty-state" id="dashboardEmpty" hidden>No messages yet — they'll show up here as soon as someone writes in.</p>
        </section>

    </main>

    <footer class="site-footer">
        <svg class="vine-divider vine-divider-footer" viewBox="0 0 800 40" preserveAspectRatio="none" aria-hidden="true">
            <path d="M0,20 C200,0 600,40 800,20" fill="none" stroke="#6b3fa0" stroke-width="1" opacity="0.6" />
        </svg>

        <div class="footer-inner">
            <span class="wordmark wordmark-small">Echo Moon Art</span>
            <p class="footer-note">© <span id="year"></span> Echo Moon Art. Conjured with care.</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
</body>
</html>

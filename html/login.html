<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Login — Echo Moon Art</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Jost:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="grain-overlay" aria-hidden="true"></div>
    <div id="ember-field" class="ember-field" aria-hidden="true"></div>

    <header class="site-header">
        <a href="../index.html" class="wordmark">Echo Moon Art</a>

        <nav class="main-nav" aria-label="Primary">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="commission.html" class="nav-link">Commission</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>

        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main>
        <section class="login-section">
            <div class="login-card">
                <p class="eyebrow eyebrow-center"><span class="moon-glyph">☾</span> private</p>
                <h1 class="login-title">Artist Login</h1>
                <p class="login-sub">This area is just for Echo Moon Art.</p>

                <form class="login-form" id="loginForm" novalidate>
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" autocomplete="email" required>
                    </div>

                    <div class="form-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                    </div>

                    <p class="form-status" id="loginStatus" hidden></p>

                    <button type="submit" class="btn btn-primary login-submit">Sign In</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <svg class="vine-divider vine-divider-footer" viewBox="0 0 800 40" preserveAspectRatio="none" aria-hidden="true">
            <path d="M0,20 C200,0 600,40 800,20" fill="none" stroke="#6b3fa0" stroke-width="1" opacity="0.6" />
        </svg>

        <div class="footer-inner">
            <span class="wordmark wordmark-small">Echo Moon Art</span>
            <nav class="footer-nav" aria-label="Footer">
                <a href="gallery.html">Gallery</a>
                <a href="about.html">About</a>
                <a href="commission.html">Commission</a>
                <a href="contact.html">Contact</a>
            </nav>
            <p class="footer-note">© <span id="year"></span> Echo Moon Art. Conjured with care.</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
